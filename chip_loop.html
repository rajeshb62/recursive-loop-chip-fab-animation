}
function closeExpanded(){
  document.getElementById('exp-overlay').classList.remove('open');
  ST.expandedStation=-1;
  EXP_PARTICLES=[];
}
function animateExpCanvas(dt){
  if(ST.expandedStation<0)return;
  updateExpP(dt);
  ST.expT+=dt*0.4;
  const p=ST.expT%1;
  const c=expCtx; const W=620,H=260;
  c.clearRect(0,0,W,H);
  c.fillStyle='#020509'; c.fillRect(0,0,W,H);

  switch(ST.expandedStation){
    case 0: drawExpandedDesign(c,W,H,p); break;
    case 1: drawExpandedMask(c,W,H,p); break;
    case 2: drawExpandedWafer(c,W,H,p); break;
    case 3: drawExpandedDice(c,W,H,p); break;
    case 4: drawExpandedTest(c,W,H,p); break;
    case 5: drawExpandedFeedback(c,W,H,p); break;
  }
  drawExpP(c);
}

function drawExpandedDesign(c,W,H,p){
  const stage=Math.floor(p*4), sp=(p*4)%1;
  const NAMES=['Requirements','Schematic','Layout Routing','DRC Check'];
  c.fillStyle='#010a01';c.fillRect(0,0,W,H);

  if(stage===0){
    const reqs=['• 3nm process node','• 5B transistors target','• < 10W TDP','• DDR5 interface','• PCIe 5.0 lanes'];
    c.fillStyle='rgba(0,30,12,0.9)';c.fillRect(20,25,W-40,H-50);
    c.strokeStyle='#00d474';c.lineWidth=1;c.strokeRect(20,25,W-40,H-50);
    c.fillStyle='#00d474';c.font='600 10px Space Grotesk';c.textAlign='left';c.fillText('Chip Specification — Rev '+ST.generation,32,44);
    c.strokeStyle='#004a20';c.lineWidth=0.5;c.beginPath();c.moveTo(32,49);c.lineTo(W-32,49);c.stroke();
    const vis=Math.floor(sp*reqs.length*1.4);
    reqs.slice(0,Math.min(vis,reqs.length)).forEach((r,i)=>{
      const lt=clamp((sp*reqs.length*1.4-i),0,1);
      c.save();c.globalAlpha=lt;c.fillStyle='#00ff80';c.font='500 9px JetBrains Mono';
      c.fillText(r,36,65+i*22);c.restore();
    });
    if(sp<0.98){
      c.fillStyle=`rgba(0,212,100,${Math.abs(Math.sin(performance.now()/280))})`;
      const curI=Math.min(vis,reqs.length-1);
      c.fillRect(36,65+curI*22-8,2,10);
    }
  }

  else if(stage===1){
    c.fillStyle='#010a01';c.fillRect(20,25,W-40,H-50);
    const traces=[
      {pts:[[40,80],[100,80],[100,110],[160,110]],col:'#00d474'},
      {pts:[[40,110],[80,110],[80,80]],col:'#00ff66'},
      {pts:[[160,80],[160,140],[240,140]],col:'#00d474'},
      {pts:[[200,170],[130,170],[130,110]],col:'#00ff66'},
      {pts:[[240,100],[280,100],[280,170],[240,170]],col:'#00d474'},
      {pts:[[40,170],[80,170],[80,200],[200,200]],col:'#00ff66'},
      {pts:[[280,130],[340,130],[340,100],[400,100]],col:'#00d474'},
      {pts:[[280,200],[360,200],[360,140],[420,140]],col:'#00ff66'},
      {pts:[[420,100],[420,200],[480,200]],col:'#00d474'},
      {pts:[[480,80],[520,80],[520,160]],col:'#00ff66'},
    ];
    const totalP=traces.reduce((s,t)=>s+t.pts.length,0);
    let cnt=0;
    traces.forEach(({pts,col})=>{
      for(let k=0;k<pts.length-1;k++){
        const ss=cnt/totalP, se=(cnt+1)/totalP;
        const sp2=clamp((sp-ss)/(se-ss),0,1);
        if(sp2>0){
          const [x0,y0]=pts[k],[x1,y1]=pts[k+1];
          c.strokeStyle=col;c.lineWidth=1.8;c.shadowColor=col;c.shadowBlur=5;
          c.beginPath();c.moveTo(x0+20,y0+20);c.lineTo(x0+(x1-x0)*sp2+20,y0+(y1-y0)*sp2+20);c.stroke();
          c.shadowBlur=0;
        }
        cnt++;
      }
      cnt++;
    });
    if(sp>0.5){
      const gp=seg(sp,0.5,0.9);
      [[175,88],[305,110],[435,127]].forEach(([gx,gy],gi)=>{
        c.save();c.globalAlpha=gp;
        c.fillStyle='rgba(0,180,80,0.15)';c.strokeStyle='#00d474';c.lineWidth=1.2;
        c.beginPath();c.roundRect(gx,gy,26,18,3);c.fill();c.stroke();
        c.fillStyle='#00ff88';c.font='700 7px JetBrains Mono';c.textAlign='center';
        c.fillText(['AND','OR','XOR'][gi],gx+13,gy+12);c.restore();
      });
    }
  }

  else if(stage===2){
    const layers=[
      {col:'#f84040',lw:1.2,segs:[[30,60,120,60],[80,60,80,120],[30,120,200,120],[150,60,150,140],[200,60,200,140]]},
      {col:'#4fd4f8',lw:1.5,segs:[[50,90,50,180],[100,40,100,180],[200,40,400,40],[300,40,300,180],[400,40,400,160]]},
      {col:'#00d474',lw:1.8,segs:[[30,30,580,30],[30,200,580,200],[500,30,500,200],[450,30,450,150]]},
    ];
    layers.forEach(({col,lw,segs},li)=>{
      const layP=seg(sp,li*0.28,li*0.28+0.55);
      c.save();c.globalAlpha=layP;c.strokeStyle=col;c.lineWidth=lw;c.shadowColor=col;c.shadowBlur=4;
      segs.forEach(([x1,y1,x2,y2],si)=>{
        const segP=seg(layP,si/segs.length,(si+1)/segs.length);
        if(segP>0){c.beginPath();c.moveTo(x1+20,y1+20);c.lineTo(x1+(x2-x1)*segP+20,y1+(y2-y1)*segP+20);c.stroke();}
      });
      c.shadowBlur=0;c.globalAlpha*=0.7;c.fillStyle=col;c.font='500 8px Space Grotesk';c.textAlign='left';
      c.fillText(['M1','M2','M3'][li],W-50,30+li*14);c.restore();
    });
    if(sp>0.7){
      const vp=seg(sp,0.7,1);
      [[100,60],[200,120],[300,40],[400,90]].forEach(([vx,vy])=>{
        c.save();c.globalAlpha=vp;c.fillStyle='rgba(255,255,255,0.7)';c.shadowColor='#ffffff';c.shadowBlur=6;
        c.beginPath();c.arc(vx+20,vy+20,3,0,Math.PI*2);c.fill();c.restore();
      });
    }
  }

  else {
    c.fillStyle='rgba(0,8,0,0.9)';c.fillRect(20,25,W-40,H-50);
    c.strokeStyle='rgba(0,60,20,0.5)';c.lineWidth=0.5;c.strokeRect(20,25,W-40,H-50);
    [[40,60,200,60],[40,100,150,100],[150,80,150,140],[60,140,280,140],
     [250,60,250,140],[280,60,400,60],[280,100,400,100]].forEach(([x1,y1,x2,y2])=>{
      c.strokeStyle='rgba(0,180,80,0.35)';c.lineWidth=1.2;
      c.beginPath();c.moveTo(x1+20,y1+20);c.lineTo(x2+20,y2+20);c.stroke();
    });
    const scanX=lerp(20,W-20,sp);
    c.strokeStyle='rgba(0,220,180,0.6)';c.lineWidth=1.5;
    c.beginPath();c.moveTo(scanX,25);c.lineTo(scanX,H-25);c.stroke();
    c.fillStyle='rgba(0,220,180,0.07)';c.fillRect(scanX-14,25,28,H-50);
    const checks=[[80,80],[120,130],[200,60],[250,100],[360,130]];
    checks.forEach(([cx2,cy2],i)=>{
      if(cx2+20<scanX){
        const cp=clamp((scanX-(cx2+20))/50,0,1);
        const isError=(i===1||i===4);
        c.save();c.globalAlpha=cp;
        if(isError){
          c.strokeStyle='#f84040';c.lineWidth=1.5;c.shadowColor='#f84040';c.shadowBlur=8;
          c.beginPath();c.arc(cx2+20,cy2+20,8,0,Math.PI*2);c.stroke();
          c.fillStyle='#f84040';c.font='700 10px JetBrains Mono';c.textAlign='center';
          c.fillText('✕',cx2+20,cy2+25);
        } else {
          c.strokeStyle='#00d474';c.lineWidth=1.5;c.shadowColor='#00d474';c.shadowBlur=6;
          c.beginPath();c.moveTo(cx2+14,cy2+21);c.lineTo(cx2+18,cy2+26);c.lineTo(cx2+28,cy2+14);c.stroke();
        }
        c.restore();
      }
    });
    const doneCount=checks.filter(([cx2])=>cx2+20<scanX).length;
    const errCount=checks.filter(([cx2],i)=>cx2+20<scanX&&(i===1||i===4)).length;
    c.fillStyle='#3a5070';c.font='500 9px Space Grotesk';c.textAlign='right';
    c.fillText(`DRC: ${doneCount}/${checks.length} checked`,W-28,H-32);
    if(errCount>0){c.fillStyle='#f84040';c.fillText(`${errCount} violation${errCount>1?'s':''}`,W-28,H-18);}
    else if(sp>0.9){c.fillStyle='#00d474';c.fillText('All clear',W-28,H-18);}
  }

  drawStageIndicator(c,W,stage,4);
  c.fillStyle='rgba(0,212,100,0.65)';c.font='500 10px Space Grotesk';c.textAlign='center';
  c.fillText(NAMES[stage],W/2,H-8);
  c.shadowBlur=0;c.globalAlpha=1;
}

function drawExpandedMask(c,W,H,p){
  const stage=Math.floor(p*3), sp=(p*3)%1;
  const NAMES=['E-Beam Write','Pattern Complete','Optical Inspect'];
  c.fillStyle='#05080f';c.fillRect(0,0,W,H);
  c.fillStyle='rgba(180,210,240,0.04)';c.strokeStyle='rgba(100,140,180,0.22)';c.lineWidth=1.5;
  c.beginPath();c.roundRect(30,25,W-60,H-50,8);c.fill();c.stroke();
  const ROWS=DEFAULT_MASK.length, COLS=DEFAULT_MASK[0].length;
  const cellS=Math.floor(Math.min((W-80)/COLS,(H-70)/ROWS));
  const ox=30+(W-60-COLS*cellS)/2, oy=25+(H-50-ROWS*cellS)/2;

  if(stage===0){
    const totalCells=ROWS*COLS;
    const writtenT=sp;
    const lineRow=Math.floor(writtenT*ROWS);
    const lineCol=Math.floor((writtenT*ROWS%1)*COLS);
    // E-beam raster path trail
    c.save();c.globalAlpha=0.35;c.strokeStyle='#4fd4f8';c.lineWidth=0.8;c.beginPath();
    for(let r=0;r<=lineRow;r++){
      const endCol=r===lineRow?lineCol:COLS;
      const yy=oy+r*cellS+cellS/2;
      if(r%2===0){c.moveTo(ox,yy);c.lineTo(ox+endCol*cellS,yy);}
      else{c.moveTo(ox+COLS*cellS,yy);c.lineTo(ox+(COLS-endCol)*cellS,yy);}
    }
    c.stroke();c.restore();
    // Chrome cells written
    for(let r=0;r<ROWS;r++)for(let col=0;col<COLS;col++){
      if(r*COLS+col<writtenT*totalCells&&DEFAULT_MASK[r][col]===1){
        c.fillStyle='#12182a';c.fillRect(ox+col*cellS+0.5,oy+r*cellS+0.5,cellS-1,cellS-1);
        c.fillStyle='rgba(80,100,130,0.28)';c.fillRect(ox+col*cellS+0.5,oy+r*cellS+0.5,cellS-1,2);
      }
    }
    // E-beam spot
    const bx=ox+lineCol*cellS, by=oy+lineRow*cellS;
    c.save();c.fillStyle='#ffffc0';c.shadowColor='#ffff40';c.shadowBlur=14;
    c.beginPath();c.arc(bx+cellS/2,by+cellS/2,3,0,Math.PI*2);c.fill();c.restore();
    if(Math.random()<0.35){
      spawnExpP({t:'spark',x:bx+cellS/2,y:by+cellS/2,
        vx:(Math.random()-0.5)*60,vy:-20-Math.random()*50,ml:0.25,c:'#f8e020',a:0.9});
    }
  }

  else if(stage===1){
    DEFAULT_MASK.forEach((row,r)=>row.forEach((v,col)=>{
      const x2=ox+col*cellS+0.5, y2=oy+r*cellS+0.5;
      if(v===1){
        c.fillStyle='#12182a';c.fillRect(x2,y2,cellS-1,cellS-1);
        c.fillStyle='rgba(80,100,130,0.28)';c.fillRect(x2,y2,cellS-1,2);
      } else {
        c.fillStyle='rgba(140,200,255,0.04)';c.fillRect(x2,y2,cellS-1,cellS-1);
        c.strokeStyle='rgba(140,200,255,0.1)';c.lineWidth=0.5;c.strokeRect(x2,y2,cellS-1,cellS-1);
      }
    }));
    const gp=eout3(sp);
    c.save();c.globalAlpha=gp*0.5;
    c.strokeStyle='rgba(79,212,248,0.7)';c.lineWidth=2;c.shadowColor='#4fd4f8';c.shadowBlur=14;
    c.beginPath();c.roundRect(30,25,W-60,H-50,8);c.stroke();c.restore();
    [[ox-8,oy-8],[ox+COLS*cellS+8,oy-8],[ox-8,oy+ROWS*cellS+8],[ox+COLS*cellS+8,oy+ROWS*cellS+8]].forEach(([ax,ay])=>{
      c.save();c.globalAlpha=gp;c.strokeStyle='rgba(79,212,248,0.7)';c.lineWidth=1.2;
      c.beginPath();c.moveTo(ax-6,ay);c.lineTo(ax+6,ay);c.stroke();
      c.beginPath();c.moveTo(ax,ay-6);c.lineTo(ax,ay+6);c.stroke();c.restore();
    });
    if(gp>0.8){
      c.fillStyle='#4fd4f8';c.font='500 10px Space Grotesk';c.textAlign='center';
      c.shadowColor='#4fd4f8';c.shadowBlur=8;c.fillText('Mask Ready',W/2,H-32);c.shadowBlur=0;
    }
  }

  else {
    DEFAULT_MASK.forEach((row,r)=>row.forEach((v,col)=>{
      const x2=ox+col*cellS+0.5, y2=oy+r*cellS+0.5;
      c.fillStyle=v===1?'#12182a':'rgba(140,200,255,0.04)';c.fillRect(x2,y2,cellS-1,cellS-1);
    }));
    const scanY=lerp(oy-4,oy+ROWS*cellS+4,sp);
    c.strokeStyle='rgba(0,220,100,0.7)';c.lineWidth=1.5;
    c.beginPath();c.moveTo(30,scanY);c.lineTo(W-30,scanY);c.stroke();
    c.fillStyle='rgba(0,220,100,0.07)';c.fillRect(30,scanY-8,W-60,16);
    if(sp>0.3){
      const ip=seg(sp,0.3,0.7);
      const iRow=Math.floor(ROWS/2), iCol=Math.floor(COLS/2);
      const ix=W-115, iy2=32, iS=80;
      c.save();c.globalAlpha=ip;
      c.fillStyle='rgba(5,12,25,0.95)';c.strokeStyle='rgba(0,220,100,0.5)';c.lineWidth=1;
      c.beginPath();c.roundRect(ix,iy2,iS,iS,4);c.fill();c.stroke();
      const zCell=iS/4;
      for(let r2=0;r2<4;r2++)for(let co=0;co<4;co++){
        const mr=clamp(iRow-1+Math.floor(r2/2),0,ROWS-1), mc=clamp(iCol-1+Math.floor(co/2),0,COLS-1);
        c.fillStyle=DEFAULT_MASK[mr][mc]?'#1a2540':'rgba(140,200,255,0.06)';
        c.fillRect(ix+co*zCell+0.5,iy2+r2*zCell+0.5,zCell-1,zCell-1);
      }
      c.fillStyle='rgba(0,220,100,0.6)';c.font='6px JetBrains Mono';c.textAlign='center';
      c.fillText('5×',ix+iS/2,iy2+iS-4);c.restore();
    }
    if(sp>0.6){
      const qp=seg(sp,0.6,1);
      c.fillStyle=`rgba(0,220,100,${qp*0.8})`;c.font='500 10px Space Grotesk';c.textAlign='center';
      c.fillText(`Quality: ${Math.round(qp*100)}%`,W/2,H-32);
    }
  }

  drawStageIndicator(c,W,stage,3);
  c.fillStyle='rgba(79,212,248,0.65)';c.font='500 10px Space Grotesk';c.textAlign='center';
  c.fillText(NAMES[stage],W/2,H-8);
  c.shadowBlur=0;c.globalAlpha=1;
}

function drawExpandedWafer(c,W,H,p){
  const stage=Math.floor(p*6), sp=(p*6)%1;
  const NAMES=['Spin Coat','Mask Align','UV Expose','Develop','Plasma Etch','Strip & Reveal'];
  const WCX=EXP_WCX, WCY=EXP_WCY, WR=EXP_WR;

  // Persistent values across stages
  const resistT=stage===0?eout3(sp):1;
  const maskDescend=stage===1?eout3(sp):stage>=2?1:0;
  const maskY=lerp(-60,WCY-WR-44,maskDescend);
  const uvT=stage===2?eout(sp):0;
  const devT=stage===3?sp:0;
  const etchT=stage>=4?(stage===4?sp:1):0;
  const stripT=stage===5?sp:0;
  const hasResist=stage<3;
  const postDev=stage>=3&&stage<5;
  const postEtch=stage>=4;

  c.fillStyle='#030912';c.fillRect(0,0,W,H);

  // Stage 0: spinning glow + robotic arm
  if(stage===0){
    for(let i=0;i<4;i++){
      c.save();c.globalAlpha=0.14*(1-i/4)*eout(sp);c.strokeStyle='#d07010';c.lineWidth=1;
      c.beginPath();c.arc(WCX,WCY,WR*(0.35+i*0.18),0,Math.PI*2);c.stroke();c.restore();
    }
    c.save();c.globalAlpha=eout(sp)*0.75;c.strokeStyle='#4a6a9a';c.lineWidth=2;
    c.beginPath();c.moveTo(WCX-WR-28,WCY-18);c.lineTo(WCX-WR+5,WCY-6);c.stroke();
    c.fillStyle='#4fd4f8';c.shadowColor='#4fd4f8';c.shadowBlur=6;
    c.beginPath();c.arc(WCX-WR+5,WCY-6,3,0,Math.PI*2);c.fill();c.restore();
  }

  // Draw wafer body
  drawWaferExp(c,WCX,WCY,WR,
    stage===0?eout3(sp)*0.5+0.5:1,
    hasResist?resistT:(postDev?1:0),
    postDev&&stage<5?DEFAULT_MASK:null,
    postEtch?etchT:0,
    stripT
  );

  // Stage 0: resist ripple rings
  if(stage===0&&eout3(sp)>0.1){
    c.save();c.beginPath();c.arc(WCX,WCY,WR,0,Math.PI*2);c.clip();
    for(let i=0;i<3;i++){
      const rt=(sp*1.5-i*0.3+1)%1;
      if(rt>0&&rt<0.85){
        c.globalAlpha=0.38*(1-rt/0.85);c.strokeStyle='rgba(255,160,30,0.6)';c.lineWidth=1;
        c.beginPath();c.arc(WCX,WCY,WR*0.2+rt*WR*0.75,0,Math.PI*2);c.stroke();
      }
    }
    c.restore();
    if(Math.random()<0.12){
      const ang=Math.random()*Math.PI*2;
      spawnExpP({t:'droplet',x:WCX+WR*0.85*Math.cos(ang),y:WCY+WR*0.85*Math.sin(ang),
        vx:Math.cos(ang+Math.PI/2)*70*sp,vy:Math.sin(ang+Math.PI/2)*70*sp,
        ml:0.3,r:1.5,c:'#d08010',a:0.8});
    }
  }

  // Stages 1-3: mask plate
  if(stage<=2||(stage===3&&sp<0.15)){
    const mw=EXP_GCOLS*EXP_CELL+10, mh=EXP_GROWS*EXP_CELL+10;
    const mAlpha=stage===1?eout(sp):(stage>=2?1:(1-sp/0.15));
    if(mAlpha>0.02){
      drawMaskPlateExp(c,WCX,maskY+mh/2,mw,mh,DEFAULT_MASK,mAlpha,mAlpha*0.8);
      if(stage===1&&sp>0.8){
        const ap=seg(sp,0.8,1);
        c.save();c.globalAlpha=ap*0.55;c.strokeStyle='#00ff99';c.lineWidth=0.8;c.setLineDash([3,4]);
        c.beginPath();c.moveTo(WCX-WR,maskY+mh);c.lineTo(WCX-WR,WCY+WR);c.stroke();
        c.beginPath();c.moveTo(WCX+WR,maskY+mh);c.lineTo(WCX+WR,WCY+WR);c.stroke();
        c.setLineDash([]);c.restore();
        if(ap>0.9){
          c.save();c.globalAlpha=(ap-0.9)*5*0.3;c.fillStyle='#00ff99';c.shadowColor='#00ff99';c.shadowBlur=20;
          c.beginPath();c.arc(WCX,WCY-WR-28,5,0,Math.PI*2);c.fill();c.restore();
        }
      }
    }
  }

  // Stage 2: UV rays through mask
  if(stage===2||(stage===3&&sp<0.2)){
    const uv=stage===2?eout(sp):(1-sp/0.2)*0.5;
    if(uv>0){
      for(let col=0;col<EXP_GCOLS;col++){
        if(DEFAULT_MASK[4]&&DEFAULT_MASK[4][col]===0){
          const rx=EXP_GX0+col*EXP_CELL;
          const rayTop=WCY-WR-40, rayBot=WCY-WR+4;
          const rg=c.createLinearGradient(0,rayTop,0,rayBot);
          rg.addColorStop(0,`rgba(150,50,255,${0.38*uv})`);rg.addColorStop(1,`rgba(100,30,220,${0.6*uv})`);
          c.fillStyle=rg;c.fillRect(rx,rayTop,EXP_CELL-1,(rayBot-rayTop)*Math.min(uv*1.2,1));
          if(uv>0.35&&Math.random()<0.1){
            spawnExpP({t:'photon',x:rx+EXP_CELL*0.5,y:rayTop+(rayBot-rayTop)*Math.random()*uv,
              vx:(Math.random()-0.5)*8,vy:15+Math.random()*25,ml:0.35,r:1.3,c:'#c060ff',a:0.85});
          }
        }
      }
      c.fillStyle=`rgba(130,40,255,${0.18*uv})`;
      c.fillRect(EXP_GX0-4,WCY-WR-44,EXP_GCOLS*EXP_CELL+8,5);
      c.strokeStyle=`rgba(170,70,255,${0.6*uv})`;c.lineWidth=1.5;
      c.beginPath();c.moveTo(EXP_GX0-4,WCY-WR-39);c.lineTo(EXP_GX0+EXP_GCOLS*EXP_CELL+4,WCY-WR-39);c.stroke();
    }
  }

  // Stage 3: developer wave
  if(stage===3){
    const waveX=lerp(WCX-WR-20,WCX+WR+20,eout(devT));
    c.save();c.beginPath();c.arc(WCX,WCY,WR,0,Math.PI*2);c.clip();
    const wg2=c.createLinearGradient(waveX-30,0,waveX+30,0);
    wg2.addColorStop(0,'rgba(30,100,255,0)');
    wg2.addColorStop(0.5,`rgba(30,100,255,${0.32*devT})`);
    wg2.addColorStop(1,'rgba(30,100,255,0)');
    c.fillStyle=wg2;c.fillRect(WCX-WR,WCY-WR,WR*2,WR*2);c.restore();
    if(Math.random()<0.12){
      spawnExpP({t:'fragment',x:WCX-WR+(waveX-(WCX-WR))*Math.random(),
        y:WCY-WR+Math.random()*WR*2,
        vx:(Math.random()-0.5)*25,vy:-12-Math.random()*25,ml:0.4,r:1.5,c:'#4080ff',a:0.8});
    }
  }

  // Stage 4: plasma etch
  if(stage===4){
    c.save();c.globalAlpha=0.26*etchT;c.fillStyle='#00ffc0';c.shadowColor='#00ffc0';c.shadowBlur=18;
    c.fillRect(EXP_GX0-4,WCY-WR-42,EXP_GCOLS*EXP_CELL+8,6);c.restore();
    for(let i=0;i<8;i++){
      const px=EXP_GX0+(i+0.5)*(EXP_GCOLS*EXP_CELL)/8;
      const rf=((etchT*3+i/8)%1);
      if(rf<0.65){c.fillStyle=`rgba(0,220,160,${0.28*etchT})`;c.fillRect(px-2,WCY-WR-36+rf*40,4,4);}
    }
    if(Math.random()<0.18){
      spawnExpP({t:'plasma',x:EXP_GX0+Math.random()*EXP_GCOLS*EXP_CELL,y:WCY-WR-30,
        vx:(Math.random()-0.5)*18,vy:18+Math.random()*35,ml:0.45,r:2,c:'#00e8b0',a:0.8});
    }
  }

  // Stage 5: strip & reveal halo
  if(stage===5){
    const gp=eout3(sp);
    c.save();c.globalAlpha=gp*0.45;
    c.strokeStyle='#c080ff';c.lineWidth=2;c.shadowColor='#a060ff';c.shadowBlur=22;
    c.beginPath();c.arc(WCX,WCY,WR+7,0,Math.PI*2);c.stroke();c.restore();
    if(gp>0.4&&Math.random()<0.14){
      const ang=Math.random()*Math.PI*2;
      spawnExpP({t:'spark',x:WCX+WR*0.92*Math.cos(ang),y:WCY+WR*0.92*Math.sin(ang),
        vx:Math.cos(ang)*55,vy:Math.sin(ang)*55,ml:0.4,c:'#e0a0ff',a:0.9});
    }
    if(gp>0.7){
      c.save();c.globalAlpha=(gp-0.7)/0.3;c.fillStyle='#00d474';c.font='500 10px Space Grotesk';
      c.textAlign='center';c.shadowColor='#00d474';c.shadowBlur=8;
      c.fillText('Lithography Complete',WCX,WCY+WR+18);c.restore();
    }
  }

  // Cross-section panel (stages 2-5)
  if(stage>=2){
    const csSlide=stage===2?eout(sp):1;
    drawCrossSectionExp(c,EXP_CSX,EXP_CSY,EXP_CSW,EXP_CSH,DEFAULT_MASK,
      stage===2?eout(sp):0,
      stage>=4?etchT:0,
      stage<4?(stage===3?Math.max(0,1-devT*0.95):1):0,
      csSlide
    );
  }

  drawStageIndicator(c,W,stage,6);
  c.fillStyle='rgba(79,212,248,0.65)';c.font='500 10px Space Grotesk';c.textAlign='center';
  c.fillText(NAMES[stage],W/2,H-8);
  c.fillStyle='rgba(80,120,160,0.42)';c.font='400 8px Space Grotesk';
  c.fillText('Top View',WCX,H-22);
  if(stage>=2){c.fillText('Cross-Section',EXP_CSX+EXP_CSW/2,H-22);}
  c.shadowBlur=0;c.globalAlpha=1;
}

function drawExpandedDice(c,W,H,p){
  const stage=Math.floor(p*3), sp=(p*3)%1;
  const NAMES=['Laser Dicing','Pick & Place','Wire Bonding'];
  const WCX=W*0.3, WCY=H*0.5, WR=90;
  c.fillStyle='#050810';c.fillRect(0,0,W,H);
  // Wafer base (all stages)
  const wg=c.createRadialGradient(WCX,WCY,WR*0.1,WCX,WCY,WR);
  wg.addColorStop(0,'#a8b4c0');wg.addColorStop(1,'#606878');
  c.beginPath();c.arc(WCX,WCY,WR,0,Math.PI*2);c.fillStyle=wg;c.fill();
  c.save();c.beginPath();c.arc(WCX,WCY,WR,0,Math.PI*2);c.clip();
  const dS=18;
  c.strokeStyle='rgba(60,90,130,0.4)';c.lineWidth=0.6;
  for(let x=WCX-WR;x<WCX+WR;x+=dS){c.beginPath();c.moveTo(x,WCY-WR);c.lineTo(x,WCY+WR);c.stroke();}
  for(let y=WCY-WR;y<WCY+WR;y+=dS){c.beginPath();c.moveTo(WCX-WR,y);c.lineTo(WCX+WR,y);c.stroke();}
  c.restore();

  if(stage===0){
    c.save();c.beginPath();c.arc(WCX,WCY,WR,0,Math.PI*2);c.clip();
    const nCuts=Math.round(WR*2/dS);
    if(sp<0.5){
      const hFrac=sp/0.5;
      c.strokeStyle='rgba(248,180,20,0.85)';c.lineWidth=1.8;c.shadowColor='#f8a020';c.shadowBlur=8;
      for(let y=WCY-WR;y<WCY+WR;y+=dS*2){
        const prog=seg(hFrac,(y-WCY+WR)/(WR*2),(y-WCY+WR)/(WR*2)+2/nCuts);
        if(prog>0){
          c.beginPath();c.moveTo(WCX-WR,y);c.lineTo(WCX-WR+(WR*2)*prog,y);c.stroke();
          if(Math.random()<0.12){
            spawnExpP({t:'spark',x:WCX-WR+(WR*2)*prog,y,
              vx:(Math.random()-0.5)*40,vy:-15-Math.random()*30,ml:0.25,c:'#f8a020',a:0.9});
          }
        }
      }
    } else {
      const vFrac=(sp-0.5)/0.5;
      c.strokeStyle='rgba(248,180,20,0.55)';c.lineWidth=1;
      for(let y=WCY-WR;y<WCY+WR;y+=dS*2){c.beginPath();c.moveTo(WCX-WR,y);c.lineTo(WCX+WR,y);c.stroke();}
      c.strokeStyle='rgba(248,180,20,0.9)';c.lineWidth=1.8;c.shadowColor='#f8a020';c.shadowBlur=8;
      for(let x=WCX-WR;x<WCX+WR;x+=dS*2){
        const prog=seg(vFrac,(x-WCX+WR)/(WR*2),(x-WCX+WR)/(WR*2)+2/nCuts);
        if(prog>0){
          c.beginPath();c.moveTo(x,WCY-WR);c.lineTo(x,WCY-WR+(WR*2)*prog);c.stroke();
          if(Math.random()<0.1){
            spawnExpP({t:'spark',x,y:WCY-WR+(WR*2)*prog,
              vx:(Math.random()-0.5)*35,vy:-12-Math.random()*25,ml:0.25,c:'#f8a020',a:0.9});
          }
        }
      }
    }
    c.restore();
    // Laser head glow
    const lhX=sp<0.5?WCX-WR+(WR*2)*Math.min(sp/0.5,1):WCX;
    const lhY=sp<0.5?WCY-WR+Math.floor((sp/0.5)*Math.round(WR*2/dS/2))*dS*2:WCY-WR+(WR*2)*Math.min((sp-0.5)/0.5,1);
    c.save();c.fillStyle='#ffffc0';c.shadowColor='#ffff40';c.shadowBlur=18;
    c.beginPath();c.arc(lhX,lhY,4,0,Math.PI*2);c.fill();c.restore();
  }

  else if(stage===1){
    c.save();c.beginPath();c.arc(WCX,WCY,WR,0,Math.PI*2);c.clip();
    c.strokeStyle='rgba(248,180,20,0.45)';c.lineWidth=1;
    for(let x=WCX-WR;x<WCX+WR;x+=dS*2){c.beginPath();c.moveTo(x,WCY-WR);c.lineTo(x,WCY+WR);c.stroke();}
    for(let y=WCY-WR;y<WCY+WR;y+=dS*2){c.beginPath();c.moveTo(WCX-WR,y);c.lineTo(WCX+WR,y);c.stroke();}
    c.restore();
    const pkX=W*0.65, pkY=H*0.25, pkS=H*0.5;
    c.fillStyle='rgba(10,14,22,0.8)';c.strokeStyle='rgba(80,100,140,0.55)';c.lineWidth=2;
    c.beginPath();c.roundRect(pkX,pkY,pkS,pkS,6);c.fill();c.stroke();
    c.fillStyle='rgba(40,60,100,0.35)';c.beginPath();c.roundRect(pkX+10,pkY+10,pkS-20,pkS-20,4);c.fill();
    const srcX=WCX+WR*0.3, srcY=WCY, dstX=pkX+pkS*0.5, dstY=pkY+pkS*0.5;
    const armP=eout3(sp);
    const cp1x=(srcX+dstX)/2, cp1y=Math.min(srcY,dstY)-60;
    c.strokeStyle='rgba(79,212,248,0.25)';c.lineWidth=1;c.setLineDash([3,4]);
    c.beginPath();c.moveTo(srcX,srcY);c.quadraticCurveTo(cp1x,cp1y,dstX,dstY);c.stroke();c.setLineDash([]);
    const t2=armP;
    const ax=(1-t2)*(1-t2)*srcX+2*(1-t2)*t2*cp1x+t2*t2*dstX;
    const ay=(1-t2)*(1-t2)*srcY+2*(1-t2)*t2*cp1y+t2*t2*dstY;
    c.fillStyle='#a8b4c0';c.strokeStyle='#4a5870';c.lineWidth=1;
    c.beginPath();c.rect(ax-7,ay-7,14,14);c.fill();c.stroke();
    c.fillStyle='rgba(79,212,248,0.65)';c.font='400 8px Space Grotesk';c.textAlign='center';
    c.fillText('die',ax,ay+4);
    if(sp>0.9){
      const lf=seg(sp,0.9,1);
      c.save();c.globalAlpha=lf*0.5;c.fillStyle='#4fd4f8';c.shadowColor='#4fd4f8';c.shadowBlur=20;
      c.beginPath();c.arc(dstX,dstY,10,0,Math.PI*2);c.fill();c.restore();
    }
    c.fillStyle='rgba(100,130,180,0.45)';c.font='400 8px Space Grotesk';c.textAlign='center';
    c.fillText('Package',pkX+pkS/2,pkY+pkS+14);
  }

  else {
    c.save();c.beginPath();c.arc(WCX,WCY,WR,0,Math.PI*2);c.clip();
    c.strokeStyle='rgba(248,180,20,0.35)';c.lineWidth=1;
    for(let x=WCX-WR;x<WCX+WR;x+=dS*2){c.beginPath();c.moveTo(x,WCY-WR);c.lineTo(x,WCY+WR);c.stroke();}
    for(let y=WCY-WR;y<WCY+WR;y+=dS*2){c.beginPath();c.moveTo(WCX-WR,y);c.lineTo(WCX+WR,y);c.stroke();}
    c.restore();
    const pkX=W*0.62, pkY=H*0.2, pkS=H*0.6;
    c.fillStyle='rgba(10,14,22,0.9)';c.strokeStyle='rgba(80,100,140,0.5)';c.lineWidth=1.5;
    c.beginPath();c.roundRect(pkX,pkY,pkS,pkS,6);c.fill();c.stroke();
    const dX=pkX+pkS*0.3, dY=pkY+pkS*0.3, dS2=pkS*0.4;
    c.fillStyle='#0d1628';c.strokeStyle='#2a3a60';c.lineWidth=1;
    c.beginPath();c.rect(dX,dY,dS2,dS2);c.fill();c.stroke();
    c.strokeStyle='rgba(0,180,80,0.35)';c.lineWidth=0.8;
    for(let i=0;i<3;i++){
      c.beginPath();c.moveTo(dX+4+i*dS2/3,dY+4);c.lineTo(dX+4+i*dS2/3,dY+dS2-4);c.stroke();
      c.beginPath();c.moveTo(dX+4,dY+4+i*dS2/3);c.lineTo(dX+dS2-4,dY+4+i*dS2/3);c.stroke();
    }
    const bonds=[
      [dX,dY+dS2*0.2,pkX+4,pkY+pkS*0.2],[dX,dY+dS2*0.5,pkX+4,pkY+pkS*0.5],
      [dX,dY+dS2*0.8,pkX+4,pkY+pkS*0.8],[dX+dS2*0.2,dY,pkX+pkS*0.2,pkY+4],
      [dX+dS2*0.5,dY,pkX+pkS*0.5,pkY+4],[dX+dS2*0.8,dY,pkX+pkS*0.8,pkY+4],
      [dX+dS2,dY+dS2*0.35,pkX+pkS-4,pkY+pkS*0.35],[dX+dS2,dY+dS2*0.65,pkX+pkS-4,pkY+pkS*0.65],
    ];
    const bondsDrawn=Math.ceil(sp*bonds.length);
    bonds.slice(0,bondsDrawn).forEach(([x0,y0,x1,y1],bi)=>{
      const bp=bi<bondsDrawn-1?1:((sp*bonds.length)%1);
      const midX=(x0+x1)/2, midY=Math.min(y0,y1)-25;
      c.strokeStyle=`rgba(248,200,20,${0.8*bp})`;c.lineWidth=1.2;c.shadowColor='#f8c020';c.shadowBlur=4;
      c.beginPath();c.moveTo(x0,y0);c.quadraticCurveTo(midX,midY,lerp(x0,x1,bp),lerp(y0,y1,bp));c.stroke();
      c.shadowBlur=0;
      if(bi===bondsDrawn-1&&bp<1&&Math.random()<0.2){
        spawnExpP({t:'spark',x:lerp(x0,x1,bp),y:lerp(y0,y1,bp),
          vx:(Math.random()-0.5)*40,vy:-15-Math.random()*30,ml:0.2,c:'#f8e020',a:0.9});
      }
    });
  }

  drawStageIndicator(c,W,stage,3);
  c.fillStyle='rgba(248,160,32,0.65)';c.font='500 10px Space Grotesk';c.textAlign='center';
  c.fillText(NAMES[stage],W/2,H-8);
  c.shadowBlur=0;c.globalAlpha=1;
}

function drawExpandedTest(c,W,H,p){
  const stage=Math.floor(p*4), sp=(p*4)%1;
  const NAMES=['Probe Descent','Signal Patterns','Thermal Map','Yield Map'];
  c.fillStyle='#070408';c.fillRect(0,0,W,H);
  const CX2=W/2, CY2=H*0.42, CS=W*0.2;

  if(stage===0){
    // Probe card + 12 needles descending
    const np=eout3(sp);
    const cardW=CS*1.5, cardH=14;
    const cardY=lerp(-cardH-10,CY2-CS/2-cardH-6,np);
    c.fillStyle='rgba(20,30,50,0.9)';c.strokeStyle='rgba(60,100,160,0.6)';c.lineWidth=1.5;
    c.beginPath();c.roundRect(CX2-cardW/2,cardY,cardW,cardH,4);c.fill();c.stroke();
    for(let i=0;i<12;i++){
      const nx=CX2-cardW/2+14+(i/11)*(cardW-28);
      c.strokeStyle='rgba(79,212,248,0.75)';c.lineWidth=1.2;c.shadowColor='#4fd4f8';c.shadowBlur=3;
      c.beginPath();c.moveTo(nx,cardY+cardH);c.lineTo(nx,lerp(cardY+cardH,CY2-CS/2,np));c.stroke();
      c.fillStyle='#4fd4f8';c.beginPath();c.arc(nx,lerp(cardY+cardH,CY2-CS/2,np),2,0,Math.PI*2);c.fill();
    }
    c.shadowBlur=0;
    // Chip
    c.fillStyle='#0d1628';c.strokeStyle='#2a3a60';c.lineWidth=2;
    c.beginPath();c.rect(CX2-CS/2,CY2-CS/2,CS,CS);c.fill();c.stroke();
    // Contact flash
    if(np>0.92){
      const cf=seg(np,0.92,1);
      c.save();c.globalAlpha=cf*0.6;c.strokeStyle='#4fd4f8';c.lineWidth=1.5;c.shadowColor='#4fd4f8';c.shadowBlur=12;
      c.beginPath();c.rect(CX2-CS/2,CY2-CS/2,CS,CS);c.stroke();c.restore();
    }
  }

  else if(stage===1){
    // Chip with heatmap cells
    c.fillStyle='#0d1628';c.strokeStyle='#2a3a60';c.lineWidth=2;
    c.beginPath();c.rect(CX2-CS/2,CY2-CS/2,CS,CS);c.fill();c.stroke();
    const hp=eout(sp);
    [[0,'#8040f0'],[1,'#f84040'],[2,'#4fd4f8'],[3,'#f84040'],[4,'#f8a020'],[5,'#4fd4f8'],[6,'#f84040'],[7,'#00d474'],[8,'#8040f0']].forEach(([k,col])=>{
      const r2=Math.floor(k/3),c2=k%3;
      c.fillStyle=col+'55';c.globalAlpha=hp;
      c.fillRect(CX2-CS/2+2+c2*(CS/3-2),CY2-CS/2+2+r2*(CS/3-2),CS/3-4,CS/3-4);
    });
    c.globalAlpha=1;
    // Probe card (static)
    const cardW=CS*1.5,cardH=14,cardY=CY2-CS/2-cardH-6;
    c.fillStyle='rgba(20,30,50,0.7)';c.strokeStyle='rgba(60,100,160,0.4)';c.lineWidth=1;
    c.beginPath();c.roundRect(CX2-cardW/2,cardY,cardW,cardH,4);c.fill();c.stroke();
    for(let i=0;i<12;i++){
      const nx=CX2-cardW/2+14+(i/11)*(cardW-28);
      c.strokeStyle='rgba(79,212,248,0.35)';c.lineWidth=1;
      c.beginPath();c.moveTo(nx,cardY+cardH);c.lineTo(nx,CY2-CS/2);c.stroke();
    }
    // 4 signal waves
    [0.6,0.7,0.8,0.9].forEach((yFr,wi)=>{
      const wy=H*yFr;
      const wp=seg(sp,wi*0.18,wi*0.18+0.6);
      const isPass=wi<2;
      const col=(isPass?'#00d474':'#f84040')+Math.round(wp*200).toString(16).padStart(2,'0');
      c.strokeStyle=col;c.lineWidth=1.5;c.beginPath();
      for(let x=30;x<W-30;x+=2){
        const ph=((x-30)/(W-60))*Math.PI*10+wi*1.2;
        x===30?c.moveTo(x,wy+Math.sin(ph)*7):c.lineTo(x,wy+Math.sin(ph)*7);
      }
      c.stroke();
      if(wp>0.4){
        c.fillStyle=isPass?'#00d474':'#f84040';c.font='600 7px JetBrains Mono';c.textAlign='left';
        c.fillText(isPass?'PASS':'FAIL',W-58,wy+4);
      }
    });
  }

  else if(stage===2){
    // Thermal heatmap 3×3
    c.fillStyle='#0d1628';c.strokeStyle='#2a3a60';c.lineWidth=2;
    c.beginPath();c.rect(CX2-CS/2,CY2-CS/2,CS,CS);c.fill();c.stroke();
    const hp=eout(sp);
    const cS3=(CS-6)/3;
    [[0,0,'#4060c0'],[1,0,'#8040a0'],[2,0,'#6040a0'],
     [0,1,'#8040a0'],[1,1,'#f84040'],[2,1,'#c84020'],
     [0,2,'#6040a0'],[1,2,'#c84020'],[2,2,'#8040a0']].forEach(([c2,r2,col])=>{
      c.globalAlpha=(c2===1&&r2===1)?hp*1.0:hp*0.75;
      c.fillStyle=col;c.fillRect(CX2-CS/2+3+c2*cS3,CY2-CS/2+3+r2*cS3,cS3-1,cS3-1);
    });
    c.globalAlpha=1;
    if(hp>0.4){
      c.save();c.globalAlpha=seg(hp,0.4,1)*0.5;
      c.strokeStyle='#ff4040';c.lineWidth=1.5;c.shadowColor='#ff0000';c.shadowBlur=12;
      c.beginPath();c.arc(CX2,CY2,12,0,Math.PI*2);c.stroke();c.restore();
    }
    // Temp scale
    const scX=W-48, scY=28, scH=H-56;
    const tg=c.createLinearGradient(0,scY,0,scY+scH);
    tg.addColorStop(0,'#ff4040');tg.addColorStop(0.5,'#f8a020');tg.addColorStop(1,'#4060c0');
    c.fillStyle=tg;c.fillRect(scX,scY,12,scH*hp);
    c.strokeStyle='rgba(60,80,120,0.45)';c.lineWidth=1;c.strokeRect(scX,scY,12,scH);
    c.fillStyle='rgba(79,212,248,0.55)';c.font='500 7px Space Grotesk';c.textAlign='center';
    c.fillText('Thermal',scX+6,scY+scH+11);
    c.fillText(`${Math.round(hp*85+25)}°C`,scX+6,scY-4);
  }

  else {
    // 8×8 yield map
    const gridR=8, gridC=8, gmW=W-80, gmH=H-60;
    const cellW=gmW/gridC, cellH=gmH/gridR;
    const ox=40, oy=28;
    for(let r2=0;r2<gridR;r2++){
      for(let c2=0;c2<gridC;c2++){
        const di=(r2*gridC+c2)/(gridR*gridC);
        const reveal=seg(sp,di*0.6,di*0.6+0.3);
        if(reveal>0){
          const isFail=(r2===0&&c2===0)||(r2===0&&c2===7)||(r2===3&&c2===2)||(r2===5&&c2===6)||(r2===7&&c2===4)||(r2===7&&c2===1);
          c.save();c.globalAlpha=reveal;
          c.fillStyle=isFail?'rgba(248,64,64,0.4)':'rgba(0,212,100,0.35)';
          c.fillRect(ox+c2*cellW+1,oy+r2*cellH+1,cellW-2,cellH-2);
          c.strokeStyle=isFail?'#f84040':'#00d474';c.lineWidth=0.8;
          c.strokeRect(ox+c2*cellW+1,oy+r2*cellH+1,cellW-2,cellH-2);
          c.restore();
        }
      }
    }
    if(sp>0.8){
      const yld=94-Math.round((1-sp)*8);
      c.fillStyle='#00d474';c.font='700 18px Space Grotesk';c.textAlign='center';
      c.shadowColor='#00d474';c.shadowBlur=12;
      c.fillText(`Yield: ${yld}%`,W/2,H-14);c.shadowBlur=0;
    }
  }

  drawStageIndicator(c,W,stage,4);
  c.fillStyle='rgba(248,64,64,0.65)';c.font='500 10px Space Grotesk';c.textAlign='center';
  c.fillText(NAMES[stage],W/2,H-8);
  c.shadowBlur=0;c.globalAlpha=1;
}

function drawExpandedFeedback(c,W,H,p){
  const stage=Math.floor(p*3), sp=(p*3)%1;
  const NAMES=['Data Compress','Pattern Localize','Design Update'];
  c.fillStyle='#070705';c.fillRect(0,0,W,H);

  if(stage===0){
    const streams=5;
    for(let i=0;i<streams;i++){
      const sx=20+i*(W-40)/streams+10, sy=22;
      const ex=W/2, ey=H*0.52;
      const cp=Math.min(sp*2,1);
      c.strokeStyle=`rgba(248,224,32,${0.48*cp})`;c.lineWidth=0.8;
      c.beginPath();c.moveTo(sx,sy);
      c.quadraticCurveTo(sx,ey*0.5,lerp(sx,ex,cp),lerp(sy,ey,cp));c.stroke();
      for(let j=0;j<3;j++){
        const bt=((sp*3+j/3+i*0.15)%1)*cp;
        const bx=sx+(ex-sx)*eout(bt), by=sy+(ey-sy)*eout(bt);
        c.fillStyle=`rgba(248,224,32,${0.7*(1-bt)})`;c.fillRect(bx-2,by-2,4,4);
      }
    }
    if(sp>0.5){
      const pp=seg(sp,0.5,1);
      c.save();c.fillStyle='#f8e020';c.shadowColor='#f8e020';c.shadowBlur=20;
      c.beginPath();c.arc(W/2,H*0.52,5+pp*6,0,Math.PI*2);c.fill();c.restore();
    }
    // Bar charts
    ['Pass','Fail','Yield','Timing'].forEach((lbl,i)=>{
      const bx2=50+i*(W-100)/4+10;
      const bh2=(H*0.28)*(0.3+[0.65,0.35,0.6,0.45][i])*sp;
      const col=['#00d474','#f84040','#4fd4f8','#f8a020'][i];
      c.fillStyle=col+'55';c.fillRect(bx2,H-32-bh2,16,bh2);
      c.strokeStyle=col;c.lineWidth=1;c.strokeRect(bx2,H-32-bh2,16,bh2);
      c.fillStyle='rgba(60,80,100,0.7)';c.font='7px Space Grotesk';c.textAlign='center';
      c.fillText(lbl,bx2+8,H-18);
    });
  }

  else if(stage===1){
    const gmR=8, gmC=8, csz=Math.min((W-100)/gmC,(H-60)/gmR);
    const ox2=(W-gmC*csz)/2, oy2=20;
    for(let r2=0;r2<gmR;r2++){
      for(let co=0;co<gmC;co++){
        const isFail=(r2>=3&&r2<=5&&co>=3&&co<=5);
        c.fillStyle=isFail?'rgba(248,64,64,0.38)':'rgba(0,180,80,0.28)';
        c.strokeStyle=isFail?'#f84040':'#00d474';c.lineWidth=0.7;
        c.beginPath();c.rect(ox2+co*csz+1,oy2+r2*csz+1,csz-2,csz-2);c.fill();c.stroke();
      }
    }
    const clX=ox2+3.5*csz, clY=oy2+4*csz;
    const rad=csz*1.8+Math.sin(sp*Math.PI*4)*5;
    c.save();c.globalAlpha=0.7;c.strokeStyle='#f84040';c.lineWidth=2;c.shadowColor='#f84040';c.shadowBlur=12;
    c.beginPath();c.arc(clX,clY,rad,0,Math.PI*2);c.stroke();c.restore();
    if(sp>0.3){
      const mp=seg(sp,0.3,0.7);
      const ix=W-115, iy2=H-92, iw=90, ih2=72;
      c.save();c.globalAlpha=mp;
      c.fillStyle='rgba(5,10,20,0.95)';c.strokeStyle='#f84040';c.lineWidth=1;
      c.beginPath();c.roundRect(ix,iy2,iw,ih2,4);c.fill();c.stroke();
      c.fillStyle='rgba(248,64,64,0.5)';c.font='600 7px JetBrains Mono';c.textAlign='center';
      c.fillText('FAIL CLUSTER',ix+iw/2,iy2+11);
      for(let r2=0;r2<3;r2++)for(let co=0;co<3;co++){
        c.fillStyle=(r2===1&&co===1)?'rgba(248,64,64,0.7)':'rgba(248,64,64,0.3)';
        c.fillRect(ix+8+co*25,iy2+18+r2*15,22,12);
      }
      c.restore();
    }
  }

  else {
    const schW=W*0.42, schH=H-50;
    c.fillStyle='rgba(0,8,0,0.9)';c.strokeStyle='rgba(0,60,20,0.5)';c.lineWidth=1;
    c.beginPath();c.roundRect(20,22,schW,schH,6);c.fill();c.stroke();
    c.fillStyle='#00d474';c.font='600 9px Space Grotesk';c.textAlign='left';
    c.fillText('Design Rev '+(ST.generation+1),32,40);
    const oldAlpha=Math.max(0,1-sp*2);
    if(oldAlpha>0){
      c.save();c.globalAlpha=oldAlpha*0.45;c.strokeStyle='#006030';c.lineWidth=1;
      [[40,60,120,60],[40,90,80,90],[80,60,80,90],[120,60,180,60]].forEach(([x1,y1,x2,y2])=>{
        c.beginPath();c.moveTo(x1+20,y1+22);c.lineTo(x2+20,y2+22);c.stroke();
      });c.restore();
    }
    const newTraces=[[40,60,100,60],[100,60,100,100],[40,100,100,100],[100,80,160,80],[160,60,220,60],[160,80,160,120],[60,120,180,120]];
    const nAl=Math.min(sp*2,1);
    const nDraw=Math.floor(nAl*newTraces.length);
    newTraces.slice(0,nDraw+1).forEach(([x1,y1,x2,y2],i)=>{
      const lp=i<nDraw?1:((nAl*newTraces.length)%1);
      c.save();c.globalAlpha=nAl;c.strokeStyle='#00d474';c.lineWidth=1.5;c.shadowColor='#00d474';c.shadowBlur=5;
      c.beginPath();c.moveTo(x1+20,y1+22);c.lineTo(x1+(x2-x1)*lp+20,y1+(y2-y1)*lp+22);c.stroke();c.restore();
    });
    const sxP=W*0.55;
    c.fillStyle='rgba(0,8,20,0.9)';c.strokeStyle='rgba(30,60,100,0.5)';c.lineWidth=1;
    c.beginPath();c.roundRect(sxP,22,W-sxP-20,schH,6);c.fill();c.stroke();
    c.fillStyle='#4fd4f8';c.font='600 9px Space Grotesk';c.textAlign='left';
    c.fillText('Gen '+(ST.generation+1)+' Specs',sxP+12,40);
    const specs=[
      {l:'Node',v:`${Math.max(2,Math.round(28-ST.generation*2))}nm`,col:'#4fd4f8'},
      {l:'Transistors',v:`${(1.8**ST.generation).toFixed(1)}B`,col:'#00d474'},
      {l:'Power',v:`${Math.max(5,Math.round(100*0.8**ST.generation))}W`,col:'#f84040'},
      {l:'Yield est',v:`${Math.min(98,70+ST.generation*3)}%`,col:'#f8e020'},
    ];
    specs.forEach(({l,v,col},i)=>{
      const sp2=seg(sp,i*0.18,i*0.18+0.4);
      c.save();c.globalAlpha=sp2;
      c.fillStyle='#3a5070';c.font='400 8px Space Grotesk';c.textAlign='left';c.fillText(l,sxP+12,58+i*28);
      c.fillStyle=col;c.font='600 11px JetBrains Mono';c.fillText(v,sxP+12,72+i*28);c.restore();
    });
    if(sp>0.85){
      c.fillStyle='rgba(0,212,100,0.8)';c.font='600 10px Space Grotesk';c.textAlign='center';
      c.shadowColor='#00d474';c.shadowBlur=8;
      c.fillText(`Gen ${ST.generation+1} queued`,W/2,H-12);c.shadowBlur=0;
    }
  }

  drawStageIndicator(c,W,stage,3);
  c.fillStyle='rgba(248,224,32,0.65)';c.font='500 10px Space Grotesk';c.textAlign='center';
  c.fillText(NAMES[stage],W/2,H-8);
  c.shadowBlur=0;c.globalAlpha=1;
}

// ══════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════
function update(dt){
  if(ST.compareMode)return; // compare mode uses its own update

  // Token motion: slow near stations, fast between
  const stationFrac=ST.tokenT%1;
  const distToNearest=Math.min(stationFrac,1-stationFrac);
  const speedMult=eout(Math.min(distToNearest*5,1));
  const effectiveSpeed=BASE_SPEED*ST.speed*(0.04+0.96*speedMult);
  // Outsource mode slows feedback segment
  const currentSeg=Math.floor(ST.tokenT)%N_STATIONS;
  const outsourceSlow=(ST.outsource&&(currentSeg===4||currentSeg===5))?0.2:1;

  const prevT=ST.tokenT;
  ST.tokenT+=dt*effectiveSpeed*outsourceSlow;

  // Check station arrivals
  for(let i=0;i<N_STATIONS;i++){
    const prevFrac=(prevT-i+N_STATIONS)%N_STATIONS;
    const currFrac=(ST.tokenT-i+N_STATIONS)%N_STATIONS;
    if(prevFrac>0.05&&currFrac<=0.05&&prevFrac-currFrac<0.5){
      triggerStation(i);
    }
  }

  // Revolution check
  const prevRev=Math.floor(prevT/N_STATIONS);
  const currRev=Math.floor(ST.tokenT/N_STATIONS);
  if(currRev>prevRev) onRevolution();

  // Update station active times
  ST.stationActive=ST.stationActive.map((a,i)=>{
    const si=Math.floor(ST.tokenT)%N_STATIONS;
    if(i===si) return Math.min(a+dt*1.5,1);
    return Math.max(a-dt*0.8,0);
  });

  // Spawn building particles occasionally
  if(Math.random()<0.03){
    const si=Math.floor(ST.tokenT)%N_STATIONS;
    const s=stationXY(si);
    const c=STATION_DEFS[si].color;
    spawnP({t:'dot',x:s.x,y:s.y,vx:(Math.random()-0.5)*40,vy:-15-Math.random()*30,ml:0.8,r:2,c,a:0.6});
  }
}

function triggerStation(i){
  ST.stationDwellTime[i]=0;
  // Burst particles
  const s=stationXY(i);
  const col=STATION_DEFS[i].color;
  for(let k=0;k<12;k++){
    const a=k/12*Math.PI*2;
    spawnP({t:'dot',x:s.x,y:s.y,vx:Math.cos(a)*60,vy:Math.sin(a)*60,ml:0.6,r:3,c:col,a:0.8});
  }
}

function onRevolution(){
  ST.generation++;
  STAT_HISTORY.push({gen:ST.generation,t:ST.tokenT});
  // Boost token speed slightly
  // Visual flash
  for(let k=0;k<30;k++){
    const a=Math.random()*Math.PI*2, r2=Math.random()*TR;
    spawnP({t:'dot',x:CX+r2*Math.cos(a),y:CY+r2*Math.sin(a),vx:(Math.random()-0.5)*40,vy:(Math.random()-0.5)*40,ml:1.0,r:3,c:'#4fd4f8',a:0.6});
  }
}

function render(dt){
  ctx.clearRect(0,0,CW,CH);

  // Background
  const bg=ctx.createRadialGradient(CX,CY,0,CX,CY,CW*0.7);
  bg.addColorStop(0,'#020814');bg.addColorStop(1,'#010408');
  ctx.fillStyle=bg;ctx.fillRect(0,0,CW,CH);

  if(ST.compareMode){
    drawCompareMode(dt);
    drawP();
    return;
  }

  drawBuilding();
  drawPtubes();
  drawTrack();
  drawOutsourceArc();
  drawTrail();

  // Station nodes + animations
  for(let i=0;i<N_STATIONS;i++){
    drawStationNode(i, ST.stationActive[i]);
  }

  // Token
  const tp=tokenXY(ST.tokenT);
  addTrailPoint(tp.x,tp.y);
  drawToken(tp.x,tp.y);

  // Gen ring
  drawGenRing();
  drawStatsPanel();
  drawP();

  // Station hover tooltip
  drawHoverEffect();
}

function drawHoverEffect(){
  if(ST.hover<0)return;
  const s=stationXY(ST.hover);
  const def=STATION_DEFS[ST.hover];
  ctx.save();
  ctx.strokeStyle=def.color+'80'; ctx.lineWidth=1.5;
  ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.arc(s.x,s.y,28,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ══════════════════════════════════════════════════
//  ANIMATION LOOP
// ══════════════════════════════════════════════════
function loop(ts){
  const dt=ST.lastTs?Math.min((ts-ST.lastTs)/1000,0.05):0;
  ST.lastTs=ts;
  update(dt);
  updateP(dt);
  updatePtubes(dt);
  animateExpCanvas(dt);
  render(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ══════════════════════════════════════════════════
//  CONTROLS
// ══════════════════════════════════════════════════
function setSpeed(v){
  ST.speed=v;
  document.querySelectorAll('#ctrl-bar .cbtn').forEach(b=>{
    if(['1×','2×','4×'].includes(b.textContent)) b.classList.remove('active');
  });
  document.getElementById('spd'+v).classList.add('active');
}
function toggleOutsource(){
  ST.outsource=!ST.outsource;
  document.getElementById('btn-outsource').classList.toggle('active',ST.outsource);
}
function toggleCompare(){
  ST.compareMode=!ST.compareMode;
  ST.compareT=[0,0]; ST.compareGen=[1,1];
  document.getElementById('btn-compare').classList.toggle('active',ST.compareMode);
}
function resetLoop(){
  ST.tokenT=0; ST.generation=1; ST.trail=[]; ST.particles=[];
  ST.stationActive.fill(0); STAT_HISTORY.length=0;
  ST.compareT=[0,0]; ST.compareGen=[1,1];
}

// Click to expand station
canvas.addEventListener('click',e=>{
  if(ST.compareMode)return;
  const rect=canvas.getBoundingClientRect();
  const scl=CW/rect.width;
  const mx=(e.clientX-rect.left)*scl, my=(e.clientY-rect.top)*(CH/rect.height);
  for(let i=0;i<N_STATIONS;i++){
    const s=stationXY(i);
    const dx=mx-s.x, dy=my-s.y;
    if(dx*dx+dy*dy<40*40){ openExpanded(i); return; }
    // Box click
    const {bx,by}=boxOffset(i);
    if(mx>bx&&mx<bx+BOX_W&&my>by&&my<by+BOX_H){ openExpanded(i); return; }
  }
});

// Hover effects
const tipEl=document.getElementById('tooltip');
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const scl=CW/rect.width;
  const mx=(e.clientX-rect.left)*scl, my=(e.clientY-rect.top)*(CH/rect.height);
  ST.hover=-1;
  canvas.style.cursor='default';
  for(let i=0;i<N_STATIONS;i++){
    const s=stationXY(i);
    const dx=mx-s.x, dy=my-s.y;
    const {bx,by}=boxOffset(i);
    if(dx*dx+dy*dy<50*50||(mx>bx&&mx<bx+BOX_W&&my>by&&my<by+BOX_H)){
      ST.hover=i;
      canvas.style.cursor='pointer';
      tipEl.style.display='block';
      tipEl.style.left=(e.clientX+12)+'px';
      tipEl.style.top=(e.clientY-10)+'px';
      tipEl.textContent=STATION_DEFS[i].label+' Click to expand.';
      return;
    }
  }
  tipEl.style.display='none';
});
canvas.addEventListener('mouseleave',()=>{ tipEl.style.display='none'; ST.hover=-1; });
</script>
